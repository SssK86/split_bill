<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清算メモアプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
    }

    .header {
      padding: 18px 16px;
      font-size: 22px;
      font-weight: 700;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .summary {
      padding: 24px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .summary-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .summary-direction {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .summary-amount {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .summary-count {
      font-size: 14px;
      color: #666;
    }

    .action-area {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      display: grid;
      gap: 10px;
    }

    .primary-button,
    .secondary-button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button {
      background: #111827;
      color: #fff;
    }

    .secondary-button {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .primary-button:hover,
    .secondary-button:hover {
      opacity: 0.92;
    }

    .section-title {
      padding: 16px 16px 10px;
      font-size: 16px;
      font-weight: 700;
      background: #fff;
    }

    .list {
      padding: 0 0 8px;
    }

    .empty {
      padding: 24px 16px 32px;
      color: #777;
      font-size: 14px;
      text-align: center;
    }

    .item-card {
      margin: 0 12px 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .item-left {
      flex: 1;
      min-width: 0;
    }

    .item-date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .item-title {
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }

    .item-amount {
      font-size: 22px;
      font-weight: 800;
      white-space: nowrap;
    }

    .item-meta {
      font-size: 14px;
      color: #444;
      margin-bottom: 12px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-settle {
      background: #dcfce7;
      color: #166534;
    }

    .btn-edit {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-delete {
      background: #fee2e2;
      color: #991b1b;
    }

    .filter-area {
      display: flex;
      gap: 8px;
      padding: 4px 12px 20px;
    }

    .filter-button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .filter-button.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .modal-header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 18px;
      font-weight: 700;
    }

    .modal-body {
      padding: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .modal-actions button {
      flex: 1;
      padding: 13px 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .save-button {
      background: #111827;
      color: #fff;
    }

    .cancel-button {
      background: #e5e7eb;
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">清算メモアプリ</div>

    <div class="summary">
      <div class="summary-label">現在の清算額</div>
      <div class="summary-direction" id="summaryDirection">清算なし</div>
      <div class="summary-amount" id="summaryAmount">¥0</div>
      <div class="summary-count" id="summaryCount">未払い 0件</div>
    </div>

    <div class="action-area">
      <button class="primary-button" id="addButton">＋ 支払いを追加</button>
      <button class="secondary-button" id="settleAllButton">未払いを全件清算済みにする</button>
    </div>

    <div class="section-title" id="listTitle">未払い一覧</div>
    <div class="list" id="paymentList"></div>

    <div class="filter-area">
      <button class="filter-button active" id="showUnpaidBtn">未払いだけ表示</button>
      <button class="filter-button" id="showAllBtn">清算済みも見る</button>
    </div>
  </div>

  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <div class="modal-header" id="modalTitle">支払いを追加</div>
      <div class="modal-body">
        <form id="paymentForm">
          <div class="form-group">
            <label for="date">日付</label>
            <input type="date" id="date" required />
          </div>

          <div class="form-group">
            <label for="title">内容</label>
            <input type="text" id="title" placeholder="例：ランチ" required />
          </div>

          <div class="form-group">
            <label for="amount">金額</label>
            <input type="number" id="amount" min="1" placeholder="例：2000" required />
          </div>

          <div class="form-group">
            <label for="paidBy">支払った人</label>
            <select id="paidBy" required>
              <option value="boyfriend">彼氏</option>
              <option value="girlfriend">彼女</option>
            </select>
          </div>

          <div class="form-group">
            <label for="status">状態</label>
            <select id="status" required>
              <option value="unpaid">未払い</option>
              <option value="settled">清算済み</option>
            </select>
          </div>
        </form>
      </div>

      <div class="modal-actions">
        <button type="button" class="save-button" id="saveButton">保存</button>
        <button type="button" class="cancel-button" id="cancelButton">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "settlement_memo_app_v2";

    let payments = loadPayments();
    let showAll = false;
    let editingId = null;

    const paymentList = document.getElementById("paymentList");
    const summaryDirection = document.getElementById("summaryDirection");
    const summaryAmount = document.getElementById("summaryAmount");
    const summaryCount = document.getElementById("summaryCount");
    const listTitle = document.getElementById("listTitle");

    const paymentModal = document.getElementById("paymentModal");
    const modalTitle = document.getElementById("modalTitle");

    const addButton = document.getElementById("addButton");
    const settleAllButton = document.getElementById("settleAllButton");
    const saveButton = document.getElementById("saveButton");
    const cancelButton = document.getElementById("cancelButton");

    const showUnpaidBtn = document.getElementById("showUnpaidBtn");
    const showAllBtn = document.getElementById("showAllBtn");

    const dateInput = document.getElementById("date");
    const titleInput = document.getElementById("title");
    const amountInput = document.getElementById("amount");
    const paidByInput = document.getElementById("paidBy");
    const statusInput = document.getElementById("status");

    function loadPayments() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : sampleData();
      } catch (error) {
        console.error("データ読み込み失敗", error);
        return sampleData();
      }
    }

    function savePayments() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payments));
    }

    function sampleData() {
      return [
        {
          id: createId(),
          date: getTodayOffset(-2),
          title: "映画",
          amount: 4000,
          paidBy: "boyfriend",
          status: "unpaid"
        },
        {
          id: createId(),
          date: getTodayOffset(-1),
          title: "カフェ",
          amount: 1000,
          paidBy: "girlfriend",
          status: "unpaid"
        },
        {
          id: createId(),
          date: getTodayOffset(0),
          title: "ランチ",
          amount: 2000,
          paidBy: "boyfriend",
          status: "unpaid"
        }
      ];
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function getTodayOffset(offsetDays) {
      const date = new Date();
      date.setDate(date.getDate() + offsetDays);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function openModal(editItem = null) {
      editingId = editItem ? editItem.id : null;
      modalTitle.textContent = editItem ? "支払いを編集" : "支払いを追加";

      if (editItem) {
        dateInput.value = editItem.date;
        titleInput.value = editItem.title;
        amountInput.value = editItem.amount;
        paidByInput.value = editItem.paidBy;
        statusInput.value = editItem.status;
      } else {
        dateInput.value = getTodayDateString();
        titleInput.value = "";
        amountInput.value = "";
        paidByInput.value = "boyfriend";
        statusInput.value = "unpaid";
      }

      paymentModal.classList.add("show");
    }

    function closeModal() {
      paymentModal.classList.remove("show");
      editingId = null;
    }

    function getTodayDateString() {
      const date = new Date();
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const [year, month, day] = dateString.split("-");
      return `${Number(month)}/${Number(day)}`;
    }

    function formatCurrency(value) {
      return `¥${Number(value).toLocaleString("ja-JP")}`;
    }

    function getPaidByLabel(value) {
      return value === "boyfriend" ? "彼氏" : "彼女";
    }

    function calculateSettlement() {
      const unpaid = payments.filter(item => item.status === "unpaid");

      const total = unpaid.reduce((sum, item) => sum + Number(item.amount), 0);
      const boyfriendPaid = unpaid
        .filter(item => item.paidBy === "boyfriend")
        .reduce((sum, item) => sum + Number(item.amount), 0);
      const girlfriendPaid = unpaid
        .filter(item => item.paidBy === "girlfriend")
        .reduce((sum, item) => sum + Number(item.amount), 0);

      const half = total / 2;
      const boyfriendBalance = boyfriendPaid - half;
      const girlfriendBalance = girlfriendPaid - half;

      let direction = "清算なし";
      let amount = 0;

      if (boyfriendBalance > 0) {
        direction = "彼女 → 彼氏";
        amount = boyfriendBalance;
      } else if (girlfriendBalance > 0) {
        direction = "彼氏 → 彼女";
        amount = girlfriendBalance;
      }

      return {
        unpaidCount: unpaid.length,
        direction,
        amount: Math.round(amount)
      };
    }

    function renderSummary() {
      const result = calculateSettlement();
      summaryDirection.textContent = result.direction;
      summaryAmount.textContent = formatCurrency(result.amount);
      summaryCount.textContent = `未払い ${result.unpaidCount}件`;
    }

    function renderList() {
      const items = [...payments]
        .filter(item => showAll || item.status === "unpaid")
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      listTitle.textContent = showAll ? "支払い一覧" : "未払い一覧";

      if (items.length === 0) {
        paymentList.innerHTML = `<div class="empty">${showAll ? "表示する支払いがありません" : "未払いはありません"}</div>`;
        return;
      }

      paymentList.innerHTML = items.map(item => `
        <div class="item-card">
          <div class="item-top">
            <div class="item-left">
              <div class="item-date">${formatDate(item.date)} ${item.status === "settled" ? "・ 清算済み" : ""}</div>
              <div class="item-title">${escapeHtml(item.title)}</div>
            </div>
            <div class="item-amount">${formatCurrency(item.amount)}</div>
          </div>
          <div class="item-meta">支払った人: ${getPaidByLabel(item.paidBy)}</div>
          <div class="item-actions">
            ${item.status === "unpaid"
              ? `<button class="small-button btn-settle" onclick="settlePayment('${item.id}')">清算済みにする</button>`
              : ""
            }
            <button class="small-button btn-edit" onclick="editPayment('${item.id}')">編集</button>
            <button class="small-button btn-delete" onclick="deletePayment('${item.id}')">削除</button>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      renderSummary();
      renderList();
      showUnpaidBtn.classList.toggle("active", !showAll);
      showAllBtn.classList.toggle("active", showAll);
    }

    function validateForm() {
      const title = titleInput.value.trim();
      const amount = Number(amountInput.value);

      if (!dateInput.value) {
        alert("日付を入力してください。");
        return false;
      }

      if (!title) {
        alert("内容を入力してください。");
        return false;
      }

      if (!Number.isFinite(amount) || amount <= 0) {
        alert("金額を正しく入力してください。");
        return false;
      }

      return true;
    }

    function saveForm() {
      if (!validateForm()) return;

      const data = {
        date: dateInput.value,
        title: titleInput.value.trim(),
        amount: Number(amountInput.value),
        paidBy: paidByInput.value,
        status: statusInput.value
      };

      if (editingId) {
        payments = payments.map(item =>
          item.id === editingId ? { ...item, ...data } : item
        );
      } else {
        payments.push({
          id: createId(),
          ...data
        });
      }

      savePayments();
      closeModal();
      render();
    }

    function settlePayment(id) {
      payments = payments.map(item =>
        item.id === id ? { ...item, status: "settled" } : item
      );
      savePayments();
      render();
    }

    function settleAllPayments() {
      const unpaidCount = payments.filter(item => item.status === "unpaid").length;

      if (unpaidCount === 0) {
        alert("未払いはありません。");
        return;
      }

      const ok = confirm(`未払い ${unpaidCount}件 を全件清算済みにしますか？`);
      if (!ok) return;

      payments = payments.map(item =>
        item.status === "unpaid" ? { ...item, status: "settled" } : item
      );

      savePayments();
      render();
    }

    function editPayment(id) {
      const item = payments.find(payment => payment.id === id);
      if (!item) return;
      openModal(item);
    }

    function deletePayment(id) {
      const target = payments.find(item => item.id === id);
      if (!target) return;

      const ok = confirm(`「${target.title}」を削除しますか？`);
      if (!ok) return;

      payments = payments.filter(item => item.id !== id);
      savePayments();
      render();
    }

    window.settlePayment = settlePayment;
    window.editPayment = editPayment;
    window.deletePayment = deletePayment;

    addButton.addEventListener("click", () => openModal());
    settleAllButton.addEventListener("click", settleAllPayments);
    saveButton.addEventListener("click", saveForm);
    cancelButton.addEventListener("click", closeModal);

    paymentModal.addEventListener("click", (event) => {
      if (event.target === paymentModal) {
        closeModal();
      }
    });

    showUnpaidBtn.addEventListener("click", () => {
      showAll = false;
      render();
    });

    showAllBtn.addEventListener("click", () => {
      showAll = true;
      render();
    });

    render();
  </script>
</body>
</html>
